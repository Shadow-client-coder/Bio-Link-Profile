<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHADOW TEST SPEED</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }

        /* === LIGHT MODE (mặc định) === */
        :root {
            --bg-primary: #f5f0ff;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a0b2e;
            --text-secondary: #4a2a6a;
            --border-color: #d4c0e8;
            --shadow-color: rgba(120, 40, 200, 0.15);
            --accent: #7a2bff;
            --accent-light: #b77aff;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(180, 80, 255, 0.2);
        }

        /* === DARK MODE === */
        body.dark {
            --bg-primary: #0b0710;
            --bg-secondary: #1a0f2a;
            --bg-card: rgba(20, 10, 35, 0.8);
            --text-primary: #e8d4ff;
            --text-secondary: #b28ad9;
            --border-color: #3a1a6a;
            --shadow-color: rgba(90, 20, 180, 0.5);
            --glass-bg: rgba(20, 10, 35, 0.65);
            --glass-border: rgba(180, 80, 255, 0.25);
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-primary);
            padding: 20px;
            position: relative;
        }

        body.dark::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 60%, rgba(120, 40, 200, 0.15), transparent 60%),
                radial-gradient(circle at 30% 80%, rgba(200, 100, 255, 0.08), transparent 50%);
            pointer-events: none;
        }

        .container {
            max-width: 820px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--glass-border);
            border-radius: 48px;
            padding: 35px 30px 30px;
            box-shadow: 0 25px 60px var(--shadow-color);
            position: relative;
            z-index: 2;
        }

        /* === HEADER === */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 28px;
            color: var(--accent);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* === MENU DROPDOWN === */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 55px;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px 0;
            min-width: 220px;
            box-shadow: 0 15px 40px var(--shadow-color);
            z-index: 10;
        }

        .dropdown-menu.active {
            display: block;
        }

        .dropdown-menu a {
            display: block;
            padding: 10px 20px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }

        .dropdown-menu a:hover {
            background: var(--bg-primary);
        }

        .dropdown-menu .divider {
            height: 1px;
            background: var(--border-color);
            margin: 6px 0;
        }

        .lang-submenu {
            padding-left: 20px;
            display: none;
        }

        .lang-submenu.active {
            display: block;
        }

        .lang-submenu a {
            font-size: 13px;
            padding: 6px 20px;
        }

        /* === MAIN DISPLAY === */
        .main-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px 0 25px;
        }

        .speed-gauge {
            position: relative;
            width: 260px;
            height: 260px;
        }

        .speed-gauge svg {
            transform: rotate(-90deg);
        }

        .speed-gauge .bg-circle {
            fill: none;
            stroke: var(--border-color);
            stroke-width: 12;
        }

        .speed-gauge .progress-circle {
            fill: none;
            stroke: var(--accent);
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 628.32;
            stroke-dashoffset: 628.32;
            transition: stroke-dashoffset 1.5s ease;
        }

        .gauge-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .gauge-value {
            font-size: 42px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .gauge-value small {
            font-size: 18px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .gauge-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
            letter-spacing: 2px;
        }

        .ping-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 15px;
        }

        .ping-item {
            text-align: center;
        }

        .ping-item .value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .ping-item .value small {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .ping-item .label {
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* === INFO CARD === */
        .info-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 20px 25px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .info-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-left .isp {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .info-left .detail {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .info-right {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .info-right .badge {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .info-right .badge:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* === BUTTONS ROW === */
        .action-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 15px 0 10px;
        }

        .action-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            flex: 1;
            min-width: 140px;
            max-width: 200px;
        }

        .action-btn:hover {
            border-color: var(--accent);
            background: var(--bg-primary);
        }

        .action-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .action-btn.primary:hover {
            opacity: 0.85;
        }

        /* === FOOTER === */
        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .footer .shadow {
            color: var(--accent);
            font-weight: 600;
        }

        /* === RESPONSIVE === */
        @media (max-width: 600px) {
            .container {
                padding: 20px 15px;
                border-radius: 32px;
            }
            .logo-text {
                font-size: 18px;
            }
            .speed-gauge {
                width: 200px;
                height: 200px;
            }
            .gauge-value {
                font-size: 32px;
            }
            .ping-row {
                gap: 20px;
            }
            .info-card {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .info-right {
                justify-content: center;
            }
            .action-btn {
                min-width: 100px;
                font-size: 12px;
                padding: 10px 16px;
            }
        }

        /* === TESTING ANIMATION === */
        .testing .progress-circle {
            animation: pulse-stroke 0.8s infinite alternate;
        }

        @keyframes pulse-stroke {
            0% {
                stroke: var(--accent);
                filter: brightness(1);
            }
            100% {
                stroke: var(--accent-light);
                filter: brightness(1.5);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="logo-area">
                <i class="fas fa-bolt logo-icon"></i>
                <span class="logo-text">SHADOW TEST</span>
            </div>
            <div class="header-right">
                <button class="theme-toggle" id="themeToggle" title="Chế độ sáng/tối">
                    <i class="fas fa-moon"></i>
                </button>
                <div style="position:relative;">
                    <button class="menu-btn" id="menuBtn">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a id="langToggle">Ngôn ngữ / Language</a>
                        <div class="lang-submenu" id="langSubmenu">
                            <a data-lang="vi">Tiếng Việt</a>
                            <a data-lang="en">English</a>
                            <a data-lang="zh">中文</a>
                            <a data-lang="ja">日本語</a>
                            <a data-lang="ko">한국어</a>
                            <a data-lang="fr">Français</a>
                            <a data-lang="de">Deutsch</a>
                            <a data-lang="es">Español</a>
                            <a data-lang="ru">Русский</a>
                            <a data-lang="ar">العربية</a>
                        </div>
                        <div class="divider"></div>
                        <a id="aboutBtn">About</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- MAIN GAUGE -->
        <div class="main-display">
            <div class="speed-gauge" id="gaugeContainer">
                <svg width="260" height="260" viewBox="0 0 260 260">
                    <circle class="bg-circle" cx="130" cy="130" r="100" />
                    <circle class="progress-circle" id="progressCircle" cx="130" cy="130" r="100" />
                </svg>
                <div class="gauge-center">
                    <div class="gauge-value" id="gaugeValue">0.00 <small>Mbps</small></div>
                    <div class="gauge-label" id="gaugeLabel">TẢI XUỐNG</div>
                </div>
            </div>
            <div class="ping-row">
                <div class="ping-item">
                    <div class="value" id="pingDisplay">-- <small>ms</small></div>
                    <div class="label">Ping</div>
                </div>
                <div class="ping-item">
                    <div class="value" id="uploadDisplay">-- <small>Mbps</small></div>
                    <div class="label">Tải lên</div>
                </div>
            </div>
        </div>

        <!-- INFO CARD -->
        <div class="info-card">
            <div class="info-left">
                <div class="isp" id="ispName">FPT Telecom</div>
                <div class="detail" id="ipDetail">1.52.34.168 · Tam Ky</div>
            </div>
            <div class="info-right">
                <span class="badge"><i class="fas fa-wifi"></i> Troubleshoot</span>
                <span class="badge"><i class="fas fa-exclamation-triangle"></i> Check Outages</span>
                <span class="badge"><i class="fas fa-headset"></i> Talk to ISP</span>
            </div>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="action-row">
            <button class="action-btn primary" id="testBtn"><i class="fas fa-play"></i> GO</button>
            <button class="action-btn" id="resetBtn"><i class="fas fa-undo"></i> Reset</button>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <span class="shadow">© Shadow Team 2026</span> · Version 4.0 · Created by Minh Tri
        </div>
    </div>

    <script>
        // === DOM ===
        const themeToggle = document.getElementById('themeToggle');
        const menuBtn = document.getElementById('menuBtn');
        const dropdownMenu = document.getElementById('dropdownMenu');
        const langToggle = document.getElementById('langToggle');
        const langSubmenu = document.getElementById('langSubmenu');
        const aboutBtn = document.getElementById('aboutBtn');
        const testBtn = document.getElementById('testBtn');
        const resetBtn = document.getElementById('resetBtn');
        const gaugeValue = document.getElementById('gaugeValue');
        const gaugeLabel = document.getElementById('gaugeLabel');
        const progressCircle = document.getElementById('progressCircle');
        const pingDisplay = document.getElementById('pingDisplay');
        const uploadDisplay = document.getElementById('uploadDisplay');
        const container = document.querySelector('.container');

        const circumference = 2 * Math.PI * 100;

        let isTesting = false;
        let currentLang = 'vi';

        // === THEME ===
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const icon = themeToggle.querySelector('i');
            if (document.body.classList.contains('dark')) {
                icon.className = 'fas fa-sun';
            } else {
                icon.className = 'fas fa-moon';
            }
        });

        // === MENU ===
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownMenu.classList.toggle('active');
        });

        document.addEventListener('click', () => {
            dropdownMenu.classList.remove('active');
            langSubmenu.classList.remove('active');
        });

        langToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            langSubmenu.classList.toggle('active');
        });

        // === LANGUAGE (demo) ===
        document.querySelectorAll('.lang-submenu a').forEach(item => {
            item.addEventListener('click', () => {
                currentLang = item.dataset.lang;
                alert('Đã chuyển sang ngôn ngữ: ' + item.textContent + ' (Demo)');
                langSubmenu.classList.remove('active');
                dropdownMenu.classList.remove('active');
            });
        });

        // === ABOUT ===
        aboutBtn.addEventListener('click', () => {
            alert(
                'SHADOW TEST SPEED\nVersion 4.0\n\nCreated by: Minh Trí\nTeam: Shadow Team\n© 2026 Shadow Team - All Rights Reserved\n\nGiao diện kiểm tra tốc độ mạng huyền ảo.'
                );
            dropdownMenu.classList.remove('active');
        });

        // === RESET ===
        resetBtn.addEventListener('click', () => {
            if (isTesting) return;
            gaugeValue.innerHTML = '0.00 <small>Mbps</small>';
            pingDisplay.innerHTML = '-- <small>ms</small>';
            uploadDisplay.innerHTML = '-- <small>Mbps</small>';
            progressCircle.style.strokeDashoffset = circumference;
            gaugeLabel.textContent = 'TẢI XUỐNG';
        });

        // === TEST ===
        function runTest() {
            if (isTesting) return;
            isTesting = true;
            container.classList.add('testing');

            gaugeLabel.textContent = 'ĐANG TEST...';
            gaugeValue.innerHTML = '... <small>Mbps</small>';
            pingDisplay.innerHTML = '... <small>ms</small>';
            uploadDisplay.innerHTML = '... <small>Mbps</small>';

            const steps = [
                { delay: 800, label: 'Ping...', ping: (20 + Math.random() * 60).toFixed(0) },
                { delay: 2000, label: 'Tải xuống...', download: (30 + Math.random() * 200).toFixed(1) },
                { delay: 3200, label: 'Tải lên...', upload: (10 + Math.random() * 80).toFixed(1) }
            ];

            let pingVal = 0,
                downVal = 0,
                upVal = 0;

            setTimeout(() => {
                pingVal = parseFloat(steps[0].ping);
                pingDisplay.innerHTML = `${pingVal} <small>ms</small>`;
                gaugeLabel.textContent = steps[0].label;
            }, steps[0].delay);

            setTimeout(() => {
                downVal = parseFloat(steps[1].download);
                gaugeValue.innerHTML = `${downVal} <small>Mbps</small>`;
                gaugeLabel.textContent = steps[1].label;

                const offset = circumference - (downVal / 1000) * circumference;
                progressCircle.style.strokeDashoffset = Math.max(0, Math.min(circumference, offset));
            }, steps[1].delay);

            setTimeout(() => {
                upVal = parseFloat(steps[2].upload);
                uploadDisplay.innerHTML = `${upVal} <small>Mbps</small>`;
                gaugeLabel.textContent = 'HOÀN TẤT';
                isTesting = false;
                container.classList.remove('testing');
            }, steps[2].delay);
        }

        testBtn.addEventListener('click', runTest);

        // === INIT ===
        progressCircle.style.strokeDashoffset = circumference;

        console.log('SHADOW TEST SPEED v4.0 - © Shadow Team 2026');
    </script>

</body>
</html>
