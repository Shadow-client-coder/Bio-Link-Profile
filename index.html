<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHADOW TEAM - Bio Link</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        :root {
            --bg-primary: #0b0710;
            --bg-card: rgba(20, 10, 35, 0.75);
            --text-primary: #e8d4ff;
            --text-secondary: #b28ad9;
            --border-color: rgba(180, 80, 255, 0.25);
            --shadow-color: rgba(90, 20, 180, 0.5);
            --accent: #7a2bff;
            --accent-light: #b77aff;
            --btn-hover: #9a4bff;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-primary);
            padding: 20px;
            background-image: radial-gradient(circle at 20% 30%, #1a0b2e, #0a0512 80%);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 60%, rgba(120, 40, 200, 0.12), transparent 60%),
                radial-gradient(circle at 30% 80%, rgba(200, 100, 255, 0.06), transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 0 0 30px 0;
            box-shadow: 0 25px 60px var(--shadow-color), inset 0 0 60px rgba(150, 50, 255, 0.05);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        /* BANNER */
        .banner {
            width: 100%;
            height: 200px;
            background: url('https://i.ibb.co/9MJV3HV/IMG-0741.jpg') center/cover no-repeat;
            position: relative;
            border-radius: 40px 40px 0 0;
        }

        .banner-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(120, 40, 200, 0.15) 0%, rgba(10, 5, 18, 0.7) 100%);
            border-radius: 40px 40px 0 0;
        }

        /* AVATAR */
        .avatar-wrapper {
            display: flex;
            justify-content: center;
            margin-top: -60px;
            position: relative;
            z-index: 2;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            background: var(--bg-primary);
            padding: 4px;
            box-shadow: 0 0 40px rgba(120, 40, 200, 0.4);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #1a0b2e;
        }

        /* INFO */
        .info {
            text-align: center;
            padding: 15px 20px 10px;
        }

        .name {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #d4a0ff, #7a2bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(120, 40, 200, 0.3);
            letter-spacing: 2px;
        }

        .owner {
            font-size: 16px;
            color: var(--text-secondary);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .owner span {
            color: var(--text-primary);
            font-weight: 600;
        }

        .country {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .email {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 18px;
            background: rgba(120, 40, 200, 0.15);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-secondary);
            font-size: 13px;
            text-decoration: none;
            transition: 0.3s;
        }

        .email:hover {
            background: rgba(120, 40, 200, 0.25);
            border-color: var(--accent-light);
            color: var(--text-primary);
        }

        .email i {
            margin-right: 8px;
            color: var(--accent-light);
        }

        /* BUTTONS */
        .links {
            padding: 15px 25px 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 16px 20px;
            background: rgba(30, 15, 55, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 60px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
        }

        .btn-link::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(120, 40, 200, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-link:hover {
            transform: translateY(-2px) scale(1.02);
            border-color: var(--accent-light);
            box-shadow: 0 10px 30px rgba(90, 20, 180, 0.3);
            background: rgba(40, 20, 70, 0.7);
        }

        .btn-link:hover::before {
            opacity: 1;
        }

        .btn-link i {
            font-size: 22px;
            width: 30px;
            text-align: center;
            color: var(--accent-light);
            transition: 0.3s;
            z-index: 1;
        }

        .btn-link:hover i {
            transform: scale(1.1);
            color: #c99eff;
        }

        .btn-link .btn-text {
            flex: 1;
            text-align: center;
            z-index: 1;
        }

        .btn-link .btn-arrow {
            color: var(--text-secondary);
            font-size: 14px;
            transition: 0.3s;
            z-index: 1;
        }

        .btn-link:hover .btn-arrow {
            transform: translateX(4px);
            color: var(--accent-light);
        }

        /* Màu sắc riêng cho từng nút khi hover */
        .btn-youtube:hover {
            border-color: #ff0033;
            box-shadow: 0 10px 30px rgba(255, 0, 51, 0.2);
        }
        .btn-youtube:hover i {
            color: #ff0033;
        }

        .btn-tiktok:hover {
            border-color: #00f2ea;
            box-shadow: 0 10px 30px rgba(0, 242, 234, 0.15);
        }
        .btn-tiktok:hover i {
            color: #00f2ea;
        }

        .btn-discord:hover {
            border-color: #5865f2;
            box-shadow: 0 10px 30px rgba(88, 101, 242, 0.2);
        }
        .btn-discord:hover i {
            color: #5865f2;
        }

        .btn-github:hover {
            border-color: #f0f6fc;
            box-shadow: 0 10px 30px rgba(240, 246, 252, 0.1);
        }
        .btn-github:hover i {
            color: #f0f6fc;
        }

        .btn-portfolio:hover {
            border-color: #ff6bff;
            box-shadow: 0 10px 30px rgba(255, 107, 255, 0.2);
        }
        .btn-portfolio:hover i {
            color: #ff6bff;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 20px 20px 0;
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            border-top: 1px solid var(--border-color);
            margin: 10px 25px 0;
        }

        .footer .highlight {
            color: var(--accent-light);
            font-weight: 600;
        }

        /* RESPONSIVE */
        @media (max-width: 500px) {
            .container {
                border-radius: 28px;
            }
            .banner {
                height: 150px;
                border-radius: 28px 28px 0 0;
            }
            .banner-overlay {
                border-radius: 28px 28px 0 0;
            }
            .avatar {
                width: 90px;
                height: 90px;
                margin-top: -50px;
            }
            .name {
                font-size: 26px;
            }
            .links {
                padding: 12px 16px 8px;
                gap: 10px;
            }
            .btn-link {
                padding: 14px 16px;
                font-size: 14px;
            }
            .btn-link i {
                font-size: 18px;
                width: 24px;
            }
            .footer {
                font-size: 11px;
                margin: 8px 16px 0;
                padding: 16px 16px 0;
            }
        }

        @media (max-width: 380px) {
            .banner {
                height: 120px;
            }
            .avatar {
                width: 75px;
                height: 75px;
                margin-top: -40px;
            }
            .name {
                font-size: 22px;
            }
            .btn-link {
                font-size: 13px;
                padding: 12px 14px;
            }
        }
    </style>
</head>
